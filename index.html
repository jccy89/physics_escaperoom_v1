<!DOCTYPE html>
<html>
<head>
    <title>Physics Escape Room - Level 1</title>
    <style>
        /* Background wallpaper */
        body::before {
            content: "";
            position: fixed;
            top:0; left:0;
            width:100%; height:100%;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                        url('wallpaper.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
        }

        /* Layout */
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 40px;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
        }

        /* Glass card */
        .container {
            width: 60%;
            max-width: 600px;
            padding: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }

        /* Score */
        #scoreDisplay {
            position: absolute;
            top: 15px;
            right: 20px;
            font-weight: bold;
            color: #facc15;
        }

        /* Progress bar */
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #334155;
            border-radius: 10px;
            margin-bottom: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #22c55e;
            width: 25%;
        }

        /* UI elements */
        h2 { margin-bottom: 20px; }
        input {
            padding:12px;
            font-size:16px;
            border-radius:8px;
            border:none;
            width: 60%;
        }
        button {
            padding:10px 20px;
            margin:10px;
            border-radius:8px;
            border:none;
            cursor:pointer;
            background-color: #22c55e;
            color: black;
            font-weight: bold;
        }
        button:hover { background-color: #16a34a; }
        #timer { font-size:18px; margin-bottom:20px; color:#facc15; }
        .hint { color:#38bdf8; cursor:pointer; }
        #feedback { margin-top: 10px; }

        /* Train animation */
        #train {
            position: absolute;
            bottom: -40px;
            width: 300px;
            left: -320px;
        }

        /* Start Screen */
        #startScreen {
            position: fixed;
            top:0; left:0;
            width:100%;
            height:100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
        }
        #startScreen input {
            width: 200px;
            margin-top: 10px;
        }
        #bgmToggle {
            position: fixed;
            top: 15px;
            left: 20px;
            z-index: 11;
        }
        #levelCompleteScreen {
    position: fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.9);
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-size: 24px;
    z-index: 20;

    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
}

#levelCompleteScreen.show {
    opacity: 1;
    pointer-events: all;
}
    </style>
</head>

<body>

<!-- Start Screen -->
<div id="startScreen">
    <h2>🎓 Physics Escape Room</h2>
    <p>Enter your name to start:</p>
    <input type="text" id="playerName" placeholder="Your Name">
    <button onclick="startGame()">Start Game</button>
</div>

<!-- BGM Toggle -->
<button id="bgmToggle" onclick="toggleBGM()">🎵 Music Off</button>

<!-- Main Game Container -->
<div class="container">
    <div id="scoreDisplay">Score: 0</div>

    <!-- Progress -->
    <div class="progress-bar">
        <div class="progress-fill"></div>
    </div>
    <p>Level 1 of 4</p>

    <!-- Timer -->
    <div id="timer"></div>

    <!-- Question -->
    <h2>🚆 Level 1: Velocity</h2>
    <p>A steam train travels along the Trans-Siberian Railway heading west, covering <b>600 meters in 30 seconds</b></p>
    <p><b>What is the train's velocity in m/s?</b></p>

    <input type="text" id="ans1"><br>
    <button onclick="checkAnswer1()">Submit</button>

    <p class="hint" onclick="showHint1()">💡 Need a hint?</p>
    <p id="feedback"></p>

    <!-- Train -->
    <img id="train" src="train.png" alt="train">
</div>
<div id="levelCompleteScreen">
    <h1>🎉 Level Complete!</h1>
    <p id="levelMessage"></p>
</div>

<!-- Audio -->
<audio id="startBgm" src="start_bgm.mp3" preload="auto" loop></audio>
<audio id="gameBgm" src="bgm.mp3" preload="auto" loop></audio>
<audio id="correctSound" src="correct.mp3" preload="auto"></audio>
<audio id="wrongSound" src="wrong.mp3" preload="auto"></audio>
<audio id="tickSound" src="tick.mp3" preload="auto"></audio>
<audio id="crashSound" src="crash.mp3" preload="auto"></audio>
<audio id="levelUpSound" src="levelup.mp3" preload="auto"></audio>

<script>
let playerName = "";
let totalTime = 30; // 30 seconds
let timerInterval;
let musicOn = false;

// Start screen BGM autoplay
window.addEventListener('load', ()=>{
    let startBgm = document.getElementById("startBgm");
    startBgm.volume = 0.4;
    startBgm.play().catch(()=>{ console.log("Autoplay blocked, waiting for user interaction"); });
});

// Start Game
function startGame(){
    let nameInput = document.getElementById("playerName").value;
    if(nameInput.trim() === ""){
        alert("Please enter your name!");
        return;
    }
    playerName = nameInput;

    localStorage.setItem("playerName", playerName);
    document.getElementById("startScreen").style.display = "none";

    // Stop start screen BGM
    let startBgm = document.getElementById("startBgm");
    startBgm.pause();
    startBgm.currentTime = 0;

    // Play game BGM
    let gameBgm = document.getElementById("gameBgm");
    gameBgm.volume = 0.4;
    gameBgm.play().catch(()=>{});

    musicOn = true;
    document.getElementById("bgmToggle").innerText = "🎵 Music On";

    startTimer();
    moveTrain();
    updateScore();
}

// Toggle BGM
function toggleBGM(){
    let gameBgm = document.getElementById("gameBgm");
    if(musicOn){
        gameBgm.pause();
        musicOn = false;
        document.getElementById("bgmToggle").innerText = "🎵 Music Off";
    } else {
        gameBgm.play().catch(()=>{ alert("⚠️ Click Start Game first to enable music!"); });
        musicOn = true;
        document.getElementById("bgmToggle").innerText = "🎵 Music On";
    }
}

// Timer
function startTimer(){
    let timerEl = document.getElementById("timer");
    timerInterval = setInterval(()=>{
        timerEl.innerHTML = `⏳ Time Left: ${totalTime}s`;

        // Tick sound last 5s
        if(totalTime <= 5 && totalTime > 0){
            document.getElementById("tickSound").play().catch(()=>{});
        }

        totalTime--;
        if(totalTime < 0){
            clearInterval(timerInterval);

            document.getElementById("crashSound").play().catch(()=>{});
            alert("⏰ Time's up! The train has crashed!");
            location.reload();
        }
    },1000);
}

// Score
if(!localStorage.score) localStorage.score = 0;
function updateScore(){
    document.getElementById("scoreDisplay").innerHTML = "Score: " + localStorage.score;
}

// Train animation
function moveTrain(){
    let train = document.getElementById("train");
    let pos = -320;
    function animate(){
        pos += 5;
        train.style.left = pos + "px";
        if(pos < window.innerWidth) requestAnimationFrame(animate);
    }
    animate();
}

// Check answer
function checkAnswer1(){
    let ans = document.getElementById("ans1").value;
    let feedback = document.getElementById("feedback");
    let correct = "20";

    if(ans === correct){
        feedback.innerHTML = `✅ Correct! Next level unlocked, ${playerName}!`;

        document.getElementById("correctSound").play();

        localStorage.score = parseInt(localStorage.score) + 10;
        updateScore();

        // ✅ NEW TRANSITION SCREEN
        showLevelComplete("level2.html");

    } else {
        feedback.innerHTML = "❌ Try again!";
        document.getElementById("wrongSound").play();
        document.getElementById("crashSound").play().catch(()=>{});
    }
}
    // ✅ Next level
function showLevelComplete(nextLevel){
    let screen = document.getElementById("levelCompleteScreen");
    let message = document.getElementById("levelMessage");

    message.innerHTML = `Great job, ${playerName}! Get ready for the next challenge...`;

    screen.classList.add("show");

    let sound = document.getElementById("levelUpSound");
    if(sound) sound.play().catch(()=>{});

    setTimeout(()=>{
        window.location.href = nextLevel;
    }, 2500);
}

// Hint
function showHint1(){
    alert("💡 Hint: Use v = s / t, displacement ÷ time.");
}
</script>
</body>
</html>
