<!DOCTYPE html>
<html>
<head>
    <title>Physics Escape Room - Level 1</title>
    <style>
/* Background wallpaper */
body::before {
    content: "";
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: 
        linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
        url('wallpaper.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    z-index: -1;
}

/* Layout */
body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 40px;
    color: white;
    text-align: center;
    font-family: Arial, sans-serif;
}

/* Glass card */
.container {
    width: 60%;
    max-width: 600px;
    padding: 30px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    position: relative;
    z-index: 1;
}

/* Score */
#scoreDisplay {
    position: absolute;
    top: 15px;
    right: 20px;
    font-weight: bold;
    color: #facc15;
}

/* Progress bar */
.progress-bar {
    width: 100%;
    height: 10px;
    background: #334155;
    border-radius: 10px;
    margin-bottom: 10px;
    overflow: hidden;
}
.progress-fill {
    height: 100%;
    background: #22c55e;
    width: 25%;
}

/* UI elements */
h2 { margin-bottom: 20px; }
input {
    padding:12px;
    font-size:16px;
    border-radius:8px;
    border:none;
    width: 60%;
}
button {
    padding:10px 20px;
    margin:10px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    background-color: #22c55e;
    color: black;
    font-weight: bold;
}
button:hover { background-color: #16a34a; }
#timer { font-size:18px; margin-bottom:20px; color:#facc15; }
.hint { color:#38bdf8; cursor:pointer; }
#feedback { margin-top: 10px; }

/* Train animation */
#train {
    position: absolute;
    bottom: -40px;
    width: 300px;
    left: -320px;
}

/* Start Screen */
#startScreen {
    position: fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    z-index: 10;
}
#startScreen input {
    width: 200px;
    margin-top: 10px;
}
#bgmToggle {
    position: fixed;
    top: 15px;
    left: 20px;
}
    </style>
</head>
<body>

<!-- Start Screen -->
<div id="startScreen">
    <h2>🎓 Physics Escape Room</h2>
    <p>Enter your name to start:</p>
    <input type="text" id="playerName" placeholder="Your Name">
    <button onclick="startGame()">Start Game</button>
</div>

<!-- Background Music Toggle -->
<button id="bgmToggle" onclick="toggleBGM()">🎵 Music Off</button>

<!-- Main Game Container -->
<div class="container">
    <div id="scoreDisplay">Score: 0</div>

    <!-- Progress -->
    <div class="progress-bar">
        <div class="progress-fill"></div>
    </div>
    <p>Level 1 of 4</p>

    <!-- Timer -->
    <div id="timer"></div>

    <!-- Question -->
    <h2>🚆 Level 1: Velocity</h2>
    <p>A steam train travels along the Trans-Siberian Railway heading west, covering <b>600 meters in 30 seconds</p>
    <p><b>What is the train's velocity in m/s?</b></p>

    <input type="text" id="ans1"><br>
    <button onclick="checkAnswer1()">Submit</button>

    <p class="hint" onclick="showHint1()">💡 Need a hint?</p>
    <p id="feedback"></p>

    <!-- Train -->
    <img id="train" src="train.png" alt="train">
</div>

<!-- Sounds -->
<audio id="correctSound" src="correct.mp3" preload="auto"></audio>
<audio id="wrongSound" src="wrong.mp3" preload="auto"></audio>
<audio id="tickSound" src="tick.mp3" preload="auto"></audio>
<audio id="bgm" src="bgm.mp3" loop preload="auto"></audio>
<audio id="crashSound" src="crash.mp3" preload="auto"></audio>

<script>
let playerName = "";
let totalTime = 20; // 20 seconds
let timerInterval;
let bgm = document.getElementById("bgm");
let musicOn = false;

// Start screen
function startGame(){
    let nameInput = document.getElementById("playerName").value;
    if(nameInput.trim() === ""){
        alert("Please enter your name to start!");
        return;
    }
    playerName = nameInput;
    document.getElementById("startScreen").style.display = "none";

    // Unlock audio for browser
    [document.getElementById("correctSound"), document.getElementById("wrongSound"), document.getElementById("tickSound")].forEach(s=>{
        s.play().then(()=>{ s.pause(); s.currentTime=0; }).catch(()=>{});
    });

    // Automatically start background music
    bgm.play().catch(()=>{});
    musicOn = true;
    document.getElementById("bgmToggle").innerText = "🎵 Music On";

    startTimer();
    moveTrain();
    updateScore();
}
// Background Music Toggle
function toggleBGM(){
    if(musicOn){
        bgm.pause();
        musicOn = false;
        document.getElementById("bgmToggle").innerText = "🎵 Music Off";
    } else {
        bgm.play().catch(()=>{ alert("⚠️ Click Start Game first to enable music!"); });
        musicOn = true;
        document.getElementById("bgmToggle").innerText = "🎵 Music On";
    }
}

// Timer
function startTimer(){
    let timerEl = document.getElementById("timer");
    timerInterval = setInterval(()=>{
        timerEl.innerHTML = `⏳ Time Left: ${totalTime}s`;

        // Optional: tick sound in last 5 seconds
        if(totalTime <= 5 && totalTime > 0){
            document.getElementById("tickSound").play().catch(()=>{});
        }

        totalTime--;

        if(totalTime < 0){
            clearInterval(timerInterval);

            // Play crash sound when time's up
            document.getElementById("crashSound").play().catch(()=>{});

            alert("⏰ Time's up! The train has crashed!");

            // Optionally, reload the level
            location.reload();
        }
    },1000);
}
// Score
if(!localStorage.score) localStorage.score = 0;
function updateScore(){
    document.getElementById("scoreDisplay").innerHTML = "Score: " + localStorage.score;
}

// Train animation
function moveTrain(){
    let train = document.getElementById("train");
    let pos = -320;
    function animate(){
        pos += 5;
        train.style.left = pos + "px";
        if(pos < window.innerWidth) requestAnimationFrame(animate);
    }
    animate();
}

// Answer checking
function checkAnswer1(){
    let ans = document.getElementById("ans1").value;
    let feedback = document.getElementById("feedback");
    let correct = "20";

    if(ans === correct){
        feedback.innerHTML = `✅ Correct! Next level unlocked, ${playerName}!`;
        document.getElementById("correctSound").play();
        localStorage.score = parseInt(localStorage.score) + 10;
        updateScore();
        setTimeout(()=>{ alert("Proceeding to next level..."); location.reload(); },1000);
    } else {
        feedback.innerHTML = "❌ Try again!";
        document.getElementById("wrongSound").play();

        // Play crash sound too
        document.getElementById("crashSound").play().catch(()=>{});

    }
}

// Hint
function showHint1(){
    alert("💡 Hint: Use v = s / t, displacement ÷ time.");
}
</script>
</body>
</html>
